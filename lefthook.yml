commit-msg:
  commands:
    commitlint:
      run: mise x -- commitlint lint --message {1}
    japanese-description:
      run: head -1 {1} | sed 's/^[^:]*:\ //' | grep -qE '[ぁ-んァ-ヶ一-龠]' || { echo "❌ description は日本語で書いてください"; exit 1; }

pre-commit:
  commands:
    lint:
      run: mise run lint

pre-push:
  commands:
    test:
      run: mise run test
    build:
      run: mise run build
